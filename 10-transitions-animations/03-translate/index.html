<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Translate Darsi</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 50px; text-align: center; }
        .container { display: flex; gap: 40px; justify-content: center; margin-top: 50px; }
        .wrapper { border: 2px dotted #aaa; }
        .box {
            width: 120px; height: 120px;
            background-color: #34495e; color: white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; transition: transform 0.3s;
        }
        
        /* Translate X */
        .box-1:hover { transform: translateX(50px); }
        
        /* Translate Y */
        .box-2:hover { transform: translateY(-50px); }
        
        /* Translate X va Y */
        .box-3:hover { transform: translate(40px, -40px); }
    </style>
</head>
<body>
    <h1>CSS Translate (Siljitish)</h1>
    <div class="container">
        <div class="wrapper"><div class="box box-1">translateX(50px)</div></div>
        <div class="wrapper"><div class="box box-2">translateY(-50px)</div></div>
        <div class="wrapper"><div class="box box-3">translate(40px, -40px)</div></div>
    </div>
</body>
</html>
