<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transform Darsi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        .container {
            display: flex;
            gap: 30px;
            margin-top: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .wrapper {
            border: 2px dashed #bdc3c7;
            padding: 10px;
            border-radius: 8px;
        }
        .box {
            width: 120px;
            height: 120px;
            background-color: #e67e22;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.4s ease;
            text-align: center;
            padding: 10px;
        }
        
        /* Transform origin o'zgarishi */
        .box-1 { transform-origin: top left; }
        .box-1:hover { transform: rotate(15deg); }

        .box-2 { transform-origin: bottom right; }
        .box-2:hover { transform: rotate(-15deg); }

        /* Kombinatsiyalangan transform */
        .box-3:hover {
            transform: translateX(20px) scale(1.1) rotate(10deg);
        }
    </style>
</head>
<body>
    <h1>CSS Transform Asoslari</h1>
    <p>Transform elementlarni surish, aylantirish, masshtablash va qiyshaytirish imkonini beradi.</p>
    
    <div class="container">
        <div class="wrapper">
            <div class="box box-1">Transform Origin<br>(Top Left)</div>
        </div>
        <div class="wrapper">
            <div class="box box-2">Transform Origin<br>(Bottom Right)</div>
        </div>
        <div class="wrapper">
            <div class="box box-3">Kombinatsiya<br>(Translate+Scale+Rotate)</div>
        </div>
    </div>
</body>
</html>
