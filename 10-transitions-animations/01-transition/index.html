<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Transition Darsi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { color: #2c3e50; }
        .container {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .box {
            width: 150px;
            height: 150px;
            background-color: #3498db;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            padding: 10px;
        }
        
        /* 1. Oddiy transition */
        .box-1 {
            transition: background-color 0.5s ease;
        }
        .box-1:hover {
            background-color: #e74c3c;
        }

        /* 2. Bir nechta xususiyatlarga transition */
        .box-2 {
            transition: background-color 0.5s ease, border-radius 0.5s ease;
        }
        .box-2:hover {
            background-color: #2ecc71;
            border-radius: 50%;
        }

        /* 3. Barcha xususiyatlarga transition (all) */
        .box-3 {
            transition: all 0.8s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 2px solid transparent;
        }
        .box-3:hover {
            background-color: #9b59b6;
            color: #fff;
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 2px solid #8e44ad;
        }
    </style>
</head>
<body>
    <h1>CSS Transition (O'tishlar)</h1>
    <p>Sichqonchani qutilar ustiga olib boring (hover):</p>
    
    <div class="container">
        <div class="box box-1">Rang o'zgarishi<br>(0.5s ease)</div>
        <div class="box box-2">Rang va Shakl<br>(0.5s ease)</div>
        <div class="box box-3">Barcha xususiyatlar<br>(all 0.8s)</div>
    </div>
</body>
</html>
