<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Timing Function</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { display: flex; flex-direction: column; gap: 15px; margin-top: 30px; }
        .track { width: 100%; max-width: 600px; background-color: #ddd; border-radius: 20px; overflow: hidden; }
        .box {
            width: 100px; height: 40px;
            background-color: #2ecc71; color: white;
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 14px;
            animation: moveRight 3s infinite alternate;
        }

        @keyframes moveRight {
            from { transform: translateX(0); }
            to { transform: translateX(500px); }
        }

        .ease { animation-timing-function: ease; background-color: #3498db; }
        .linear { animation-timing-function: linear; background-color: #e74c3c; }
        .ease-in { animation-timing-function: ease-in; background-color: #9b59b6; }
        .ease-out { animation-timing-function: ease-out; background-color: #f1c40f; }
        .ease-in-out { animation-timing-function: ease-in-out; background-color: #e67e22; }
        .steps { animation-timing-function: steps(5); background-color: #34495e; }

    </style>
</head>
<body>
    <h1>CSS Animation Timing Function</h1>
    <p>Animatsiyaning tezlashish va sekinlashish grafigi.</p>
    <div class="container">
        <div class="track"><div class="box ease">ease</div></div>
        <div class="track"><div class="box linear">linear</div></div>
        <div class="track"><div class="box ease-in">ease-in</div></div>
        <div class="track"><div class="box ease-out">ease-out</div></div>
        <div class="track"><div class="box ease-in-out">ease-in-out</div></div>
        <div class="track"><div class="box steps">steps(5)</div></div>
    </div>
</body>
</html>
